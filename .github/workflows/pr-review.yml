on:
  pull_request_target:
    branches: [main, master]

name: Render the new Quarto files

# https://github.com/r-lib/actions/tree/v2/examples#render-rmarkdown
# https://github.com/quarto-dev/quarto-actions

env:
  isExtPR: ${{ github.event.pull_request.head.repo.fork == true }}
  RUST_BACKTRACE: 1

jobs:
  # ── Job 1: Format check ────────────────────────────────────────────────────
  format-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect changed QMD files
        id: changed-qmd
        uses: tj-actions/changed-files@v46.0.5
        with:
          files: |
            **.qmd
            **.Qmd

      - name: Set up Python
        if: steps.changed-qmd.outputs.any_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Run QMD format checker
        if: steps.changed-qmd.outputs.any_changed == 'true'
        id: format-check
        env:
          QMD_FILES: ${{ steps.changed-qmd.outputs.all_changed_files }}
        run: |
          python - <<'PYEOF'
          import os, re, sys

          REQUIRED_SECTIONS = ["## Example", "## Setup", "## Data Preparation", "## Visualization"]
          REQUIRED_YAML_FIELDS = ["title", "author"]
          YAML_BLOCK_RE = re.compile(r'^---\s*\n(.*?)\n---', re.DOTALL)
          CODE_BLOCK_RE = re.compile(r'```\{r\s+([^}]+)\}')

          files = os.environ.get("QMD_FILES", "").split()
          errors = {}
          warnings = {}

          for filepath in files:
              if not filepath.endswith((".qmd", ".Qmd")):
                  continue
              # Skip Chinese translations – they mirror the English source
              if filepath.endswith(".zh.qmd"):
                  continue

              try:
                  content = open(filepath, encoding="utf-8").read()
              except FileNotFoundError:
                  continue

              file_errors = []
              file_warnings = []

              # 1. YAML frontmatter
              m = YAML_BLOCK_RE.match(content)
              if not m:
                  file_errors.append("Missing YAML frontmatter (expected `---` block at top)")
              else:
                  yaml_text = m.group(1)
                  for field in REQUIRED_YAML_FIELDS:
                      if not re.search(rf'^{field}\s*:', yaml_text, re.MULTILINE):
                          file_errors.append(f"Missing required YAML field: `{field}`")

              # 2. Required sections
              for section in REQUIRED_SECTIONS:
                  if section not in content:
                      file_warnings.append(f"Missing recommended section: `{section}`")

              # 3. Code block labels (should have labels for figures)
              for match in CODE_BLOCK_RE.finditer(content):
                  opts       = match.group(1)
                  block_body = match.group(2)
                  if "fig-cap" in block_body and "label" not in opts:
                      line_no = content[:match.start()].count("\n") + 1
                      file_warnings.append(f"Code block near line {line_no} has `fig-cap` but no `label`")

              # 4. Demo image
              if "![" not in content:
                  file_warnings.append("No demo image found (recommended: `![](../images/...)`)")

              # 5. Line length sanity (warn on very long lines in prose)
              for i, line in enumerate(content.splitlines(), 1):
                  if len(line) > 500 and not line.startswith("```"):
                      file_warnings.append(f"Very long line ({len(line)} chars) at line {i} – consider breaking it up")
                      break  # one warning per file is enough

              if file_errors:
                  errors[filepath] = file_errors
              if file_warnings:
                  warnings[filepath] = file_warnings

          # Build output
          summary_lines = []
          has_errors = bool(errors)

          if errors:
              summary_lines.append("### ❌ Format Errors (must fix)")
              for fp, errs in errors.items():
                  summary_lines.append(f"\n**`{fp}`**")
                  for e in errs:
                      summary_lines.append(f"- {e}")

          if warnings:
              summary_lines.append("\n### ⚠️ Format Warnings (recommended)")
              for fp, warns in warnings.items():
                  summary_lines.append(f"\n**`{fp}`**")
                  for w in warns:
                      summary_lines.append(f"- {w}")

          if not errors and not warnings:
              summary_lines.append("### ✅ All checked QMD files pass format validation!")

          summary = "\n".join(summary_lines)
          print(summary)

          # Write to GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              # Escape newlines for multi-line output
              safe = summary.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")
              fh.write(f"summary={safe}\n")
              fh.write(f"has_errors={'true' if has_errors else 'false'}\n")

          if has_errors:
              sys.exit(1)
          PYEOF

      - name: Comment format check results on PR
        if: steps.changed-qmd.outputs.any_changed == 'true' && always()
        uses: actions/github-script@v7
        env:
          FORMAT_SUMMARY: ${{ steps.format-check.outputs.summary }}
          HAS_ERRORS: ${{ steps.format-check.outputs.has_errors }}
        with:
          script: |
            const summary = process.env.FORMAT_SUMMARY || '(no output)';
            const hasErrors = process.env.HAS_ERRORS === 'true';
            const icon = hasErrors ? '❌' : '✅';

            const body = `## ${icon} QMD Format Check\n\n${summary}\n\n` +
              `> Automated check by the [PR Review workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).\n` +
              `> See [contribution guidance](../blob/main/Template/visualization_guidance_EN.qmd) for the expected tutorial format.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ── Job 2: Render preview ──────────────────────────────────────────────────
  build-deploy:
    runs-on: ubuntu-latest
    needs: format-check
    if: "!failure()"
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Scan .qmd for dependencies and update
        run: Rscript update-dependencies.R

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Get the new quarto files
        id: new-qmd-files
        uses: tj-actions/changed-files@v46.0.5 # v46
        with:
          files: |
            **.Qmd
            **.qmd

      - name: Render the new quarto files
        if: steps.new-qmd-files.outputs.any_changed == 'true'
        env:
          QMD_FILES: ${{ steps.new-qmd-files.outputs.all_changed_files }}
        run: |
          # every qmd file should be self-contained
          mkdir -p _QMD_RENDER_REVIEW
          mkdir -p _QMD_RENDER_WORKING_DIR
          for file in ${QMD_FILES}; do
            myfile=$(basename "$file")
            myname="${myfile%.*}" # remove file extension
            mkdir -p "_QMD_RENDER_REVIEW/$myname"
            cp "$file" "_QMD_RENDER_WORKING_DIR/$myfile"
            echo "Rendering $file"
            quarto render "_QMD_RENDER_WORKING_DIR/$myfile" --execute-dir .
            mv _QMD_RENDER_WORKING_DIR/* "_QMD_RENDER_REVIEW/$myname/"
          done

      - name: Upload Quarto artifacts
        if: steps.new-qmd-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v4
        id: artifact-upload
        with:
          name: quarto-rendered-files
          path: _QMD_RENDER_REVIEW
          if-no-files-found: "ignore"

      - name: Comment PR with artifact link
        if: steps.new-qmd-files.outputs.any_changed == 'true' && github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        env:
          CHANGED_FILES: ${{ steps.new-qmd-files.outputs.all_changed_files }}
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;
            const artifactUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}`;
            const changedFiles = process.env.CHANGED_FILES;
            
            const comment = `## 📊 Quarto Render Preview
            
            The new or modified Quarto files have been rendered and are available as artifacts.
            
            **🔗 [View and Download Rendered Files](${artifactUrl})**
            
            Click the link above, scroll to the "Artifacts" section at the bottom of the page, and download \`quarto-rendered-files\` to preview the rendered HTML files.
            
            **Modified files:**
            \`\`\`
            ${changedFiles}
            \`\`\`
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: repo.owner,
              repo: repo.repo,
              body: comment
            });
