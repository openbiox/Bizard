name: Generate Skills

# Run whenever QMD tutorials are updated on the main branch,
# or manually via workflow_dispatch.
on:
  push:
    branches: [main, master]
    paths:
      - '**.qmd'
      - '.github/scripts/generate_skills.py'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Generate skill documents and JSON index
        run: |
          python .github/scripts/generate_skills.py \
            --input . \
            --output skills/ \
            --base-url "https://openbiox.github.io/Bizard/" \
            --format both \
            --verbose

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard skills/)" ]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No skill file changes detected."
          else
            echo "committed=true" >> "$GITHUB_OUTPUT"
            echo "Skill files updated."
            git status --short
          fi

      - name: Commit and push skill documents
        if: steps.git-check.outputs.committed == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add skills/
          git commit -m "chore: regenerate AI skill documents" \
            -m "Auto-generated skill documents from all QMD tutorials."
          git push origin ${{ github.ref_name }}
