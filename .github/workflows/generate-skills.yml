name: Generate Skills

# Run whenever QMD tutorials are updated on the main branch,
# when the skill spec or generation script changes, or on manual dispatch.
# Also supports being called from the skill-command workflow.
on:
  push:
    branches: [main, master]
    paths:
      - '**.qmd'
      - 'skill-spec.md'
      - '.github/scripts/generate_skills.py'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for command-triggered runs)'
        required: false
        default: ''
      offline:
        description: 'Use offline mode (no LLM API)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # If triggered from a PR, check out the PR branch
      - name: Checkout PR branch
        if: inputs.pr_number != ''
        run: |
          PR_NUM="${{ inputs.pr_number }}"
          echo "Fetching PR #${PR_NUM}..."
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM})
          PR_BRANCH=$(echo "$PR_DATA" | jq -r '.head.ref')
          PR_REPO=$(echo "$PR_DATA" | jq -r '.head.repo.full_name')
          echo "PR branch: ${PR_BRANCH} from ${PR_REPO}"
          git fetch origin "${PR_BRANCH}"
          git checkout "${PR_BRANCH}"
          echo "PR_BRANCH=${PR_BRANCH}" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate unified SKILL.md
        env:
          AI_Model_API_KEY: ${{ secrets.AI_Model_API_KEY }}
          AI_Model_BASE_URL: ${{ secrets.AI_Model_BASE_URL }}
          AI_Model_Name: ${{ secrets.AI_Model_Name }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS="--base-url https://openbiox.github.io/Bizard/ --verbose"

          # Check if offline mode is requested
          if [ "${{ inputs.offline }}" = "true" ]; then
            ARGS="${ARGS} --offline"
          fi

          python .github/scripts/generate_skills.py ${ARGS}

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet SKILL.md; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No SKILL.md changes detected."
          else
            echo "committed=true" >> "$GITHUB_OUTPUT"
            echo "SKILL.md updated."
            git status --short SKILL.md
          fi

      - name: Commit and push SKILL.md
        if: steps.git-check.outputs.committed == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add SKILL.md
          git commit -m "chore: regenerate AI skill document" \
            -m "Auto-generated SKILL.md from QMD tutorials."
          BRANCH="${PR_BRANCH:-${{ github.ref_name }}}"
          git push origin "${BRANCH}"

      - name: Post PR comment
        if: steps.git-check.outputs.committed == 'true' && inputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            if (!prNumber) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `✅ **SKILL.md regenerated** and pushed to the PR branch.\n\nSee the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });
