on:
  push:
    branches: [main, master]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '.github/**'
      - '*.md'
  workflow_dispatch:

name: Github Page

env:
  isExtPR: ${{ github.event.pull_request.head.repo.fork == true }}
  RUST_BACKTRACE: 1

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: quarto-publish-${{ github.event_name != 'pull_request' || github.run_id }}
      cancel-in-progress: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TMP_DIR: /mnt/TMP
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      # ── R Setup ──────────────────────────────────────────────
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/renv
            ~/.cache/R/renv
            /usr/local/lib/R/site-library
            ~/R
          key: r-packages-${{ runner.os }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            r-packages-${{ runner.os }}-

      - uses: r-lib/actions/setup-r-dependencies@v2

      # ── Python Setup ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ── Julia Setup ──────────────────────────────────────────
      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-packages-${{ runner.os }}-${{ hashFiles('Julia/*.qmd') }}
          restore-keys: |
            julia-packages-${{ runner.os }}-

      - name: Install Julia packages
        run: |
          julia -e '
            using Pkg
            Pkg.update()
            Pkg.add(["CairoMakie", "DataFrames", "Statistics", "QuartoNotebookRunner"])
            # Precompile to speed up rendering
            using CairoMakie, DataFrames, Statistics, QuartoNotebookRunner
          '

      # ── Dependency Scanning ──────────────────────────────────
      - name: Scan and update dependencies
        run: |
          Rscript update-dependencies.R
          python manage-dependencies.py --update

      - name: Commit updated dependency files
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add DESCRIPTION requirements.txt
          git commit -m 'chore: update dependencies' || echo "No changes to commit"
          git push origin || echo "No changes to commit"

      # ── Freeze Cache ─────────────────────────────────────────
      - name: Cache freeze directory
        uses: actions/cache@v4
        with:
          path: _freeze
          key: freeze-${{ runner.os }}-${{ hashFiles('**/*.qmd') }}
          restore-keys: |
            freeze-${{ runner.os }}-

      # ── Render ───────────────────────────────────────────────
      - name: Create temporary directory
        run: |
          sudo mkdir -p ${{ env.TMP_DIR }}
          sudo chown -R $USER:$USER ${{ env.TMP_DIR }}

      - name: Render website with Babelquarto
        env:
          TMPDIR: ${{ env.TMP_DIR }}
          TMP: ${{ env.TMP_DIR }}
          TEMP: ${{ env.TMP_DIR }}
          R_COMPILE_PKGS: 0
        run: Rscript -e 'babelquarto::render_website()'

      # ── Deploy ───────────────────────────────────────────────
      - name: Upload Quarto artifacts
        if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Commit updated _freeze
        if: github.event_name != 'pull_request'
        run: |
          if [ -d "_freeze" ] && [ -n "$(ls -A _freeze)" ]; then
            git add -A _freeze
            git commit -m 'chore: update frozen contents' || echo "No changes to commit"
            git push origin || echo "No changes to push"
          else
            echo "_freeze is empty or missing, skipping"
          fi

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup temporary directory
        if: always()
        run: |
          TMP_PATH="${{ env.TMP_DIR }}"
          if [ -n "$TMP_PATH" ] && [[ "$TMP_PATH" =~ ^/mnt/TMP ]] && [ -d "$TMP_PATH" ]; then
            sudo rm -rf "$TMP_PATH"
            echo "Removed $TMP_PATH directory"
          else
            echo "Skipping cleanup - validation failed (path: $TMP_PATH)"
          fi
