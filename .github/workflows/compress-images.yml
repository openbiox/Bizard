name: Compress Images

on:
  pull_request:
    paths:
      - 'images/**'
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install compression tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pngquant optipng jpegoptim

      - name: Compress images
        run: bash scripts/compress-images.sh images/

      - name: Commit compressed images
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add images/
          git commit -m 'chore: compress images' || echo "No changes to commit"
          git push || echo "No changes to push"
